<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il tuo link di accesso</title>
</head>
<body style="margin:0;padding:0;background:#f8fafc;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
          <tr>
            <td style="background:#ea580c;padding:24px 32px;">
              <span style="color:#ffffff;font-size:20px;font-weight:800;">🏃 Vieni a correre?</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <h2 style="margin:0 0 16px;font-size:22px;font-weight:800;color:#111827;">
                Accedi a Vieni a correre?
              </h2>
              <p style="margin:0 0 12px;font-size:15px;color:#374151;line-height:1.6;">Ciao,</p>
              <p style="margin:0 0 28px;font-size:15px;color:#374151;line-height:1.6;">
                usa il pulsante qui sotto per accedere al tuo account su <strong>Vieni a correre?</strong>.<br>
                Il link è valido per un solo utilizzo.
              </p>
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-radius:10px;background:#ea580c;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;padding:14px 28px;background:#ea580c;color:#ffffff;text-decoration:none;border-radius:10px;font-weight:700;font-size:15px;">
                      Accedi
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;font-size:13px;color:#6b7280;line-height:1.5;">
                Se non hai richiesto tu questo accesso, puoi ignorare questa email.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;border-top:1px solid #f3f4f6;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">Vieni a correre? — Corri in compagnia, in sicurezza.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
